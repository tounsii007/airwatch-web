name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  lint-test-build:
    name: Lint, test, build, size-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit + component tests (vitest)
        run: npm test

      - name: Build (Next.js standalone)
        run: npm run build
        env:
          # Build-time URL doesn't matter for the bundle, just needs to
          # be defined. CI builds same way prod compose builds.
          NEXT_PUBLIC_PROXY_URL: http://localhost:18080
          INTERNAL_API_URL: http://localhost:18080

      # Performance budget — fails the build if a PR pushes the bundle
      # past the budgets in scripts/check-bundle-budget.mjs. The script
      # splits chunks into "core" (every-user code) and "lazy 3D"
      # (Cesium / deck.gl, gated behind /globe and /replay/3d) so a
      # routine Cesium update doesn't trip CI but a regression in the
      # shared shell or a accidental static import of a heavy lib does.
      - name: Bundle size check (core + lazy-3D)
        run: npm run size

      # Per-route admin perf budget — separate from the global core/lazy
      # split because the admin shell has its own page-size ceilings (an
      # admin page that ships an unintended map library should fail CI
      # even if the global core budget still has headroom).
      #
      # Non-blocking until Next.js 16 emits .next/diagnostics/route-bundle-stats.json
      # again — the current `next build --webpack` output skips it, so the
      # script exits 2 with "No .next/diagnostics/route-bundle-stats.json"
      # before it can even read budgets. Re-tighten when the upstream Next
      # bug is fixed or we switch the budget script to walk static/chunks/.
      - name: Admin perf budget
        run: npm run size:admin -- --json > admin-perf-budget.json
        continue-on-error: true

      # Surface the admin perf JSON as a CI artifact so reviewers can
      # diff bundle sizes across PRs without re-running the build.
      - name: Upload admin perf report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-perf-report
          path: admin-perf-budget.json
          if-no-files-found: ignore
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────
  # Dependency vulnerability gate — npm audit for known CVEs in the
  # transitive tree. Fails on HIGH or CRITICAL findings; moderate
  # is reported as a comment in the job log but doesn't break CI
  # (every dep tree has noise at moderate level).
  # ────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (deps CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

      # Even when the audit passes, surface the full report as an
      # artifact so the moderate-level noise can be reviewed without
      # re-running the job. --json output is parseable by Dependabot
      # comparison scripts.
      - name: Audit report (full, including moderate)
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: ignore
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # Lighthouse CI — runtime perf + accessibility scoring on the public
  # routes. Categories scored: performance / accessibility / best-
  # practices / seo. Accessibility ≥ 0.90 + CLS < 0.10 are HARD
  # ASSERTS (CI fails); the rest WARN so PRs aren't blocked on
  # transient throttling noise.
  #
  # Pairs with the existing Bundle-budget step which gates the
  # JS payload size; Lighthouse measures the runtime cost.
  # ────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI (public routes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PROXY_URL: http://localhost:18080
          INTERNAL_API_URL: http://localhost:18080

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true   # non-blocking for the first PR cycle

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Run E2E in a dedicated job so a flaky test doesn't block the unit
    # pipeline. `needs:` is intentionally omitted — both can run in
    # parallel, faster turnaround on PRs.
    #
    # Non-blocking on CI: the suite assumes the airwatch-api compose
    # stack is reachable at localhost:13000, but the sibling
    # `working-directory: ../airwatch` doesn't exist on the GitHub
    # runner (we don't checkout the API repo here). Run locally with
    # the full stack up to actually exercise these specs. The job is
    # kept on the workflow so PRs still get the Playwright report
    # artifact for triage.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Spin up the airwatch-api stack via docker compose. Tests assume
      # the full stack is available at localhost:13000 (nginx ingress).
      # Without the api the Playwright fixtures auto-skip backend-
      # dependent assertions via the `apiAvailable` helper.
      - name: Start backend stack
        working-directory: ../airwatch
        run: |
          if [ -f docker-compose.yml ]; then
            cp .env.example .env
            # Wave-1 compose hardening turned the `.env.example` defaults
            # into __REQUIRED_SET_IN_DOT_ENV__ placeholders and forced the
            # critical services through ${VAR:?...} boot-guards. The api
            # additionally validates ADMIN_PASSWORD_HASH as a real BCrypt
            # hash at startup. Inject CI-only test credentials here so the
            # Playwright stack can come up. These are NOT production
            # credentials — they exist only for this workflow run.
            cat >> .env <<'CIENV'
          # --- CI overrides (appended; last assignment wins for docker-compose) ---
          POSTGRES_PASSWORD=ci-test-pg
          POSTGRES_REPLICATION_PASSWORD=ci-test-replication
          AIRWATCH_API_SECRET=ci-test-hmac-secret-which-is-at-least-32-characters-long
          GRAFANA_ADMIN_PASSWORD=ci-test-grafana
          REDIS_PASSWORD=ci-test-redis
          # BCrypt of "ci-test-admin" (cost 10).
          ADMIN_PASSWORD_HASH=$$2a$$10$$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy
          CIENV
            docker compose up -d --wait postgres api nginx web || true
            # Give the stack ~30 s to settle. CI runners are slow.
            timeout 60 bash -c 'until curl -sf http://localhost:13000/ > /dev/null; do sleep 2; done' || true
          fi
        continue-on-error: true

      - name: Run E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:13000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
