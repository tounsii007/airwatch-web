name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-test-build:
    name: Lint, test, build, size-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit + component tests (vitest)
        run: npm test

      - name: Build (Next.js standalone)
        run: npm run build
        env:
          # Build-time URL doesn't matter for the bundle, just needs to
          # be defined. CI builds same way prod compose builds.
          NEXT_PUBLIC_PROXY_URL: http://localhost:18080
          INTERNAL_API_URL: http://localhost:18080

      # Performance budget — fails the build if a PR pushes the bundle
      # past the budgets in scripts/check-bundle-budget.mjs. The script
      # splits chunks into "core" (every-user code) and "lazy 3D"
      # (Cesium / deck.gl, gated behind /globe and /replay/3d) so a
      # routine Cesium update doesn't trip CI but a regression in the
      # shared shell or a accidental static import of a heavy lib does.
      - name: Bundle size check (core + lazy-3D)
        run: npm run size

      # Per-route admin perf budget — separate from the global core/lazy
      # split because the admin shell has its own page-size ceilings (an
      # admin page that ships an unintended map library should fail CI
      # even if the global core budget still has headroom).
      - name: Admin perf budget
        run: npm run size:admin -- --json > admin-perf-budget.json

      # Surface the admin perf JSON as a CI artifact so reviewers can
      # diff bundle sizes across PRs without re-running the build.
      - name: Upload admin perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-perf-report
          path: admin-perf-budget.json
          if-no-files-found: ignore
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────
  # Dependency vulnerability gate — npm audit for known CVEs in the
  # transitive tree. Fails on HIGH or CRITICAL findings; moderate
  # is reported as a comment in the job log but doesn't break CI
  # (every dep tree has noise at moderate level).
  # ────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (deps CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

      # Even when the audit passes, surface the full report as an
      # artifact so the moderate-level noise can be reviewed without
      # re-running the job. --json output is parseable by Dependabot
      # comparison scripts.
      - name: Audit report (full, including moderate)
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: ignore
          retention-days: 30

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Run E2E in a dedicated job so a flaky test doesn't block the unit
    # pipeline. `needs:` is intentionally omitted — both can run in
    # parallel, faster turnaround on PRs.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Spin up the airwatch-api stack via docker compose. Tests assume
      # the full stack is available at localhost:13000 (nginx ingress).
      # Without the api the Playwright fixtures auto-skip backend-
      # dependent assertions via the `apiAvailable` helper.
      - name: Start backend stack
        working-directory: ../airwatch
        run: |
          if [ -f docker-compose.yml ]; then
            cp .env.example .env
            docker compose up -d --wait postgres api nginx web || true
            # Give the stack ~30 s to settle. CI runners are slow.
            timeout 60 bash -c 'until curl -sf http://localhost:13000/ > /dev/null; do sleep 2; done' || true
          fi
        continue-on-error: true

      - name: Run E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:13000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
